spring.application.name=DrinkGo-backend

# ============================================
# BASE DE DATOS MySQL (CPanel Cloud)
# ============================================
# Base de datos 'licores_drinkgo' en phpMyAdmin de CPanel
spring.datasource.url=jdbc:mysql://localhost:3306/licores_drinkgo
spring.datasource.username=licores_rest
spring.datasource.password=Clave12345@_@6
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
# 'create-drop' borra y recrea la BD cada vez (desarrollo)
# 'create' solo recrea al iniciar (desarrollo)
# 'update' solo actualiza sin borrar (producción)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Dialecto específico para las versiones más recientes de MySQL
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ============================================
# Server Configuration
# ============================================
server.port=6677

# Configuración para evitar errores de esquemas de PostgreSQL en MySQL
spring.jpa.generate-ddl=true

# ============================================
# SQL Initialization - Seeds
# ============================================
# PRIMERA VEZ: Dejar en 'never' hasta que las tablas se creen correctamente
# DESPUÉS: Cambiar a 'always' para cargar datos de prueba
# PRODUCCIÓN / ya inicializado: 'never' para no re-ejecutar seeds en cada arranque
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
# Seeds de SuperAdmin - Se cargan en orden
spring.sql.init.data-locations=optional:classpath:seeds/01_superadmin_usuarios.sql,optional:classpath:seeds/02_planes_suscripcion.sql,optional:classpath:seeds/03_negocios_demo.sql,optional:classpath:seeds/04_catalogo_demo.sql,optional:classpath:seeds/05_inventario_demo.sql,optional:classpath:seeds/06_proveedores_compras_demo.sql,optional:classpath:seeds/07_pos_demo_data.sql,optional:classpath:seeds/09_modulos_permisos.sql,optional:classpath:seeds/10_programadores_demo.sql
spring.sql.init.continue-on-error=true

# ============================================
# JWT Configuration
# ============================================
jwt.secret=drinkgo-superadmin-secret-key-2026-muy-segura-no-compartir

# ============================================
# File Upload Configuration
# ============================================
app.upload.dir=${user.home}/drinkgo_uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB